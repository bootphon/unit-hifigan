exclude: uv.lock
repos:
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: v1.26.1
  hooks:
    - id: zizmor
- repo: https://github.com/crate-ci/typos
  rev: v1.47.2
  hooks:
    - id: typos
- repo: https://github.com/tombi-toml/tombi-pre-commit
  rev: v1.1.4
  hooks:
    - id: tombi-format
    - id: tombi-lint
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.18
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format
- repo: https://github.com/astral-sh/uv-pre-commit
  rev: 0.11.23
  hooks:
    - id: uv-lock
    - id: uv-audit
      args: [ --ignore, GHSA-h35f-9h28-mq5c, --ignore, PYSEC-2026-3447] # pysptk uses pkg_resources and requires setuptools<82
- repo: https://github.com/astral-sh/ty-pre-commit
  rev: v0.0.56
  hooks:
    - id: ty
      args: [ --group=test, --extra=whisper ]
